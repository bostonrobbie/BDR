// ===== GROUP CONFIG =====
const groups = {
  account:    { color: { background: '#1f4e8c', border: '#4A90D9', highlight: { background: '#2563ab', border: '#74b4f4' } }, font: { color: '#a8d4ff', size: 12 }, shape: 'box' },
  contact:    { color: { background: '#1a3d27', border: '#27AE60', highlight: { background: '#215a35', border: '#4ed880' } }, font: { color: '#90e8a0', size: 12 }, shape: 'ellipse' },
  warmLead:   { color: { background: '#5a3800', border: '#F39C12', highlight: { background: '#7a4d00', border: '#ffc242' } }, font: { color: '#ffd080', size: 12 }, shape: 'star' },
  dnc:        { color: { background: '#3d1a1a', border: '#7f1f1f', highlight: { background: '#521f1f', border: '#c0392b' } }, font: { color: '#c08080', size: 11 }, shape: 'triangle' },
  proofPoint: { color: { background: '#5a3000', border: '#E67E22', highlight: { background: '#7a4200', border: '#ffaa55' } }, font: { color: '#ffcc99', size: 11 }, shape: 'diamond' },
  skill:      { color: { background: '#2d1a3d', border: '#8E44AD', highlight: { background: '#3d2557', border: '#b07ae0' } }, font: { color: '#d0a8ff', size: 12 }, shape: 'roundRect' },
  incident:   { color: { background: '#3d0d0d', border: '#E74C3C', highlight: { background: '#5a1212', border: '#ff7070' } }, font: { color: '#ff9999', size: 12 }, shape: 'hexagon' },
  dataFile:   { color: { background: '#1f2630', border: '#5c6a7a', highlight: { background: '#2a3540', border: '#8ba0b5' } }, font: { color: '#a8b8c8', size: 11 }, shape: 'database' },
  vertical:   { color: { background: '#0f3a36', border: '#16A085', highlight: { background: '#154f4a', border: '#2ec4b6' } }, font: { color: '#80dfd8', size: 12 }, shape: 'box' },
  rule:       { color: { background: '#3d0020', border: '#C0392B', highlight: { background: '#520030', border: '#e05060' } }, font: { color: '#ff9090', size: 11 }, shape: 'triangle' },
};

const groupMeta = {
  account:    { label: 'Accounts', color: '#4A90D9' },
  contact:    { label: 'Contacts', color: '#27AE60' },
  warmLead:   { label: 'Warm Leads', color: '#F39C12' },
  dnc:        { label: 'DNC', color: '#7f1f1f' },
  proofPoint: { label: 'Proof Points', color: '#E67E22' },
  skill:      { label: 'Skills', color: '#8E44AD' },
  incident:   { label: 'Incidents', color: '#E74C3C' },
  dataFile:   { label: 'Data Files', color: '#5c6a7a' },
  vertical:   { label: 'Verticals', color: '#16A085' },
  rule:       { label: 'HC Rules', color: '#C0392B' },
};

// ===== BUILD NETWORK =====
let network, allNodes, allEdges, hiddenGroups = new Set();

function buildNetwork() {
  const nodes = new vis.DataSet(nodeData.map(n => ({
    ...n,
    title: n.label,
    font: groups[n.group]?.font,
    color: groups[n.group]?.color,
    shape: groups[n.group]?.shape || 'ellipse',
  })));

  const edges = new vis.DataSet(edgeData.map((e, i) => ({
    ...e,
    id: i,
    font: { size: 9, color: '#484f58', strokeWidth: 0, align: 'middle' },
    color: e.color || { color: '#30363d', highlight: '#58a6ff' },
    smooth: { type: 'continuous' },
    width: 1,
    selectionWidth: 2,
  })));

  allNodes = nodes;
  allEdges = edges;

  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = edges.length;

  const container = document.getElementById('graph-canvas');
  const data = { nodes, edges };
  const options = {
    physics: {
      enabled: true,
      barnesHut: {
        gravitationalConstant: -12000,
        centralGravity: 0.1,
        springLength: 160,
        springConstant: 0.04,
        damping: 0.2,
      },
      stabilization: { iterations: 300 }
    },
    interaction: {
      hover: true,
      tooltipDelay: 300,
      navigationButtons: false,
      keyboard: true,
      zoomView: true,
    },
    edges: {
      font: { size: 9, color: '#484f58', strokeWidth: 0 },
      smooth: { type: 'curvedCW', roundness: 0.1 },
    },
    nodes: {
      borderWidth: 1.5,
      borderWidthSelected: 2.5,
      font: { size: 12, color: '#e1e4e8', face: '-apple-system, sans-serif' },
      margin: 6,
    },
  };

  network = new vis.Network(container, data, options);

  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      showNodeDetail(nodeId);
    } else {
      clearNodeDetail();
    }
  });

  network.on('doubleClick', function(params) {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      focusOnNode(nodeId);
    }
  });
}

function showNodeDetail(nodeId) {
  const node = nodeData.find(n => n.id === nodeId);
  if (!node) return;

  const group = groupMeta[node.group];
  const detail = node.detail || {};

  // Find connected nodes
  const connectedEdges = allEdges.get({ filter: e => e.from === nodeId || e.to === nodeId });
  const connections = connectedEdges.map(e => {
    const otherId = e.from === nodeId ? e.to : e.from;
    const otherNode = nodeData.find(n => n.id === otherId);
    const direction = e.from === nodeId ? '→' : '←';
    return { node: otherNode, edge: e, direction };
  });

  let html = `
    <div class="node-title">${node.label.replace(/\n/g, ' ')}</div>
    <div class="node-type-badge" style="background:${group?.color}22;color:${group?.color};border:1px solid ${group?.color}55">${group?.label || node.group}</div>
  `;

  for (const [key, val] of Object.entries(detail)) {
    html += `<div class="prop"><label>${key}</label><value>${val}</value></div>`;
  }

  if (connections.length > 0) {
    html += `<div class="connections"><h3>Connections (${connections.length})</h3>`;
    connections.forEach(c => {
      if (!c.node) return;
      const cGroup = groupMeta[c.node.group];
      html += `<div class="conn-item">
        <span style="color:${cGroup?.color}">${c.node.label.replace(/\n/g, ' ')}</span>
        <span class="conn-label">${c.direction} ${c.edge.label || ''}</span>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('node-detail').innerHTML = html;
}

function clearNodeDetail() {
  document.getElementById('node-detail').innerHTML = '<div class="empty">Click any node to inspect it.</div>';
}

function focusOnNode(nodeId) {
  const connectedEdges = allEdges.get({ filter: e => e.from === nodeId || e.to === nodeId });
  const connectedNodeIds = new Set([nodeId]);
  connectedEdges.forEach(e => { connectedNodeIds.add(e.from); connectedNodeIds.add(e.to); });

  const update = nodeData.map(n => ({
    id: n.id,
    opacity: connectedNodeIds.has(n.id) ? 1 : 0.08,
  }));
  allNodes.update(update);

  setTimeout(() => {
    const resetUpdate = nodeData.map(n => ({ id: n.id, opacity: hiddenGroups.has(n.group) ? 0 : 1 }));
    allNodes.update(resetUpdate);
  }, 4000);
}

// ===== FILTERS =====
function buildFilters() {
  const container = document.getElementById('filters');
  const legend = document.getElementById('legend');

  Object.entries(groupMeta).forEach(([group, meta]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.textContent = meta.label;
    btn.style.background = meta.color + '22';
    btn.style.color = meta.color;
    btn.style.borderColor = meta.color + '55';
    btn.dataset.group = group;

    btn.addEventListener('click', () => {
      if (hiddenGroups.has(group)) {
        hiddenGroups.delete(group);
        btn.classList.remove('inactive');
        btn.classList.add('active');
      } else {
        hiddenGroups.add(group);
        btn.classList.remove('active');
        btn.classList.add('inactive');
      }
      applyGroupFilter();
    });

    container.appendChild(btn);

    // Legend item
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${meta.color}"></div><span>${meta.label}</span>`;
    legend.appendChild(item);
  });
}

function applyGroupFilter() {
  const update = nodeData.map(n => ({
    id: n.id,
    hidden: hiddenGroups.has(n.group),
  }));
  allNodes.update(update);
}

// ===== SEARCH =====
document.getElementById('search-input').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase().trim();
  if (!query) {
    const reset = nodeData.map(n => ({ id: n.id, opacity: hiddenGroups.has(n.group) ? 0 : 1 }));
    allNodes.update(reset);
    return;
  }

  const update = nodeData.map(n => {
    const text = (n.label + JSON.stringify(n.detail || '')).toLowerCase();
    const match = text.includes(query);
    return { id: n.id, opacity: match ? 1 : 0.08 };
  });
  allNodes.update(update);

  const matches = nodeData.filter(n => {
    const text = (n.label + JSON.stringify(n.detail || '')).toLowerCase();
    return text.includes(query);
  });

  if (matches.length === 1) {
    showNodeDetail(matches[0].id);
    network.focus(matches[0].id, { scale: 1.4, animation: true });
  }
});

// ===== INIT =====
buildFilters();
buildNetwork();
</script>
