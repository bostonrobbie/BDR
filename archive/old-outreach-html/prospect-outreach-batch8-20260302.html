b, mobile, and agent portals", "touch1_body": "How do you manage test coverage across three different platforms without QA burnout?\n\nMulti-platform testing compounds complexity. Each platform changes. Each needs regression coverage. Maintenance sprawls.\n\nMedibuddy automated 2,500 tests with AI and cut test maintenance by 50% using Testsigma. That's coverage at scale without the overhead.\n\nIf getting 50% of your maintenance time back to focus on new platform features would help, what day works for a quick look at how they did it?\n\nRob", "touch2_subject": "Re: Testing web, mobile, and agent portals", "touch2_body": "Quick note: CRED hit 90% regression automation across web and mobile platforms. Same AI approach, different vertical, same result.\n\nWhat day works to see how they scaled coverage without scaling headcount?\n\nRob", "touch3_subject": "Multi-platform QA at scale without burnout", "touch3_body": "Vinayak,\n\nPortal updates, app releases, and web changes move on different cycles. Your QA team ends up context switching constantly, and regression coverage gets thin.\n\nMedibuddy solved this: automated 2,500 tests. Maintenance dropped 50%. Same team, way more coverage.\n\nIf freeing up that bandwidth for your roadmap priorities matters, what day works for a quick chat?\n\nRob", "predicted_objection": "We're a smaller team, not sure we need enterprise-level automation.", "objection_response": "That's actually where it helps most. Medibuddy's team stayed lean while automating 2,500 tests. Smaller teams get the biggest leverage from cutting maintenance in half."}, {"name": "Morya Moyal", "title": "QA Manager", "company": "Hippo Insurance", "email_status": "verified", "priority": 4, "ab_group": "B", "vertical": "Insurance", "mqs": 12, "touch1_subject": "Integration testing after acquisition", "touch1_body": "When you're integrating a new acquisition, how do you keep your existing QA velocity while validating the new platform?\n\nAcquisitions double your tes                         ${touch3Section}
                        
                        <div style="padding: 15px; background: #0f1419; border: 1px solid #2d3748; border-radius: 6px; margin: 15px 0;">
                            <div style="font-size: 12px; font-weight: 600; color: #a0aec0; text-transform: uppercase; margin-bottom: 8px;">Cadence Status</div>
                            <select class="dropdown">
                                <option>ON_TRACK</option>
                                <option>AHEAD</option>
                                <option>BEHIND</option>
                                <option>COMPLETE</option>
                            </select>
                        </div>
                        
                        ${objectionSection}
                    </div>
                </div>
            `;
        }
        
        function toggleContent(index) {
            const content = document.getElementById(`content-${index}`);
            const btn = event.target;
            
            content.classList.toggle('open');
            btn.textContent = content.classList.contains('open') ? '▼ Hide Outreach Sequence' : '► Show Outreach Sequence';
        }
        
        function toggleObjection(event) {
            const content = event.target.nextElementSibling;
            content.classList.toggle('open');
            event.target.textContent = content.classList.contains('open') ? '▼ Predicted Objection' : '► Predicted Objection';
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy');
            });
        }
        
        function updateStatus(index, status) {
            console.log(`Prospect ${index}: ${status}`);
        }
        
        function renderProspects() {
            const filtered = prospectsData.filter(p => {
                const priorityMatch = filters.priority === 'all' || p.priority.toString() === filters.priority;
                const verticalMatch = filters.vertical === 'all' || p.vertical === filters.vertical;
                return priorityMatch && verticalMatch;
            });
            
            const html = filtered.map((p, idx) => renderProspect(p, prospectsData.indexOf(p))).join('');
            document.getElementById('prospects').innerHTML = html;
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const filterType = this.dataset.filter;
                const value = this.dataset.value;
                
                document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                filters[filterType] = value;
                renderProspects();
            });
        });
        
        renderStats();
        renderProspects();
    </script>
</body>
</html>
