<style>

  .header .subtitle { color: var(--text2); font-size: 13px; }

  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-box { flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .date-range { display: flex; gap: 8px; align-items: center; }
  .date-input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }

  .stats-bar { display: flex; gap: 24px; padding: 12px 32px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); overflow-x: auto; }
  .stat { white-space: nowrap; }
  .stat strong { color: var(--text); font-weight: 600; }

  .content { padding: 24px 32px; max-width: 1000px; }

  .day-block { margin-bottom: 32px; }
  .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .day-date { font-size: 18px; font-weight: 700; color: var(--text); }
  .day-label { font-size: 13px; color: var(--text2); background: var(--surface2); padding: 3px 10px; border-radius: 12px; }
  .day-count { font-size: 12px; color: var(--text2); margin-left: auto; }

  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; transition: border-color 0.2s; }
  .entry:hover { border-color: var(--accent); }
  .entry-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .entry-time { font-size: 12px; color: var(--text2); font-family: monospace; min-width: 50px; }
  .cat-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .cat-outreach { background: rgba(108,142,255,0.15); color: var(--accent); }
  .cat-docs { background: rgba(78,205,196,0.15); color: var(--accent2); }
  .cat-research { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .cat-system { background: rgba(167,139,250,0.15); color: var(--purple); }
  .cat-planning { background: rgba(251,146,60,0.15); color: var(--orange); }
  .cat-incident { background: rgba(248,113,113,0.15); color: var(--red); }
  .cat-milestone { background: rgba(74,222,128,0.15); color: var(--green); }
  .cat-meeting { background: rgba(244,114,182,0.15); color: var(--pink); }
  .cat-admin { background: rgba(156,163,184,0.15); color: var(--text2); }

  .entry-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .entry-detail { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 4px; }
  .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag { font-size: 11px; color: var(--text2); background: var(--bg); padding: 2px 8px; border-radius: 8px; border: 1px solid var(--border); }

  .new-entry-section { background: var(--surface); border: 2px dashed var(--border); border-radius: 12px; padding: 24px; margin-bottom: 32px; }
  .new-entry-section h3 { font-size: 15px; margin-bottom: 16px; color: var(--accent); }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-input { flex: 1; min-width: 150px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
  .form-textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; min-height: 80px; resize: vertical; font-family: inherit; }
  .form-select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
  .btn-add { padding: 10px 24px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-add:hover { opacity: 0.85; }

  .export-bar { display: flex; gap: 10px; padding: 16px 32px; border-top: 1px solid var(--border); background: var(--surface); position: sticky; bottom: 0; }
  .btn-export { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  @media (max-width: 768px) {

    .content { padding: 16px; }

}

function saveLog(data) {
  // Note: localStorage may not persist in all environments

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}

// Merge seed data with stored data (add any seed entries not in stored)
if (loadLog()) {
  const storedDates = new Set(logData.map(d => d.date));
  seedData.forEach(sd => {
    if (!storedDates.has(sd.date)) {
      logData.push(sd);
    }
  });
  logData.sort((a, b) => b.date.localeCompare(a.date));
}

let activeCat = 'all';

function toggleCat(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  filterEntries();
}

function filterEntries() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  renderLog(search, activeCat, dateFrom, dateTo);
}

function renderLog(search = '', cat = 'all', dateFrom = '', dateTo = '') {
  const container = document.getElementById('logContainer');
  let html = '';
  let totalEntries = 0;
  let visibleEntries = 0;
  let catCounts = {};

  logData.forEach(day => {
    const filteredEntries = day.entries.filter(e => {
      totalEntries++;
      // Category filter
      if (cat !== 'all' && e.category !== cat) return false;
      // Date range filter
      if (dateFrom && day.date < dateFrom) return false;
      if (dateTo && day.date > dateTo) return false;
      // Search filter
      if (search) {
        const haystack = (e.title + ' ' + e.detail + ' ' + (e.tags||[]).join(' ')).toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    filteredEntries.forEach(e => {
      catCounts[e.category] = (catCounts[e.category] || 0) + 1;
    });

    if (filteredEntries.length === 0) return;
    visibleEntries += filteredEntries.length;

    html += '<div class="day-block">';
    html += '<div class="day-header">';
    html += '<div class="day-date">' + formatDate(day.date) + '</div>';
    html += '<div class="day-label">' + (day.day || getDayName(day.date)) + '</div>';
    html += '<div class="day-count">' + filteredEntries.length + ' entr' + (filteredEntries.length === 1 ? 'y' : 'ies') + '</div>';
    html += '</div>';

    filteredEntries.forEach(e => {
      html += '<div class="entry">';
      html += '<div class="entry-header">';
      if (e.time && e.time !== '—') html += '<span class="entry-time">' + e.time + '</span>';
      html += '<span class="cat-badge cat-' + e.category + '">' + e.category + '</span>';
      html += '<span class="entry-title">' + escHtml(e.title) + '</span>';
      html += '</div>';
      html += '<div class="entry-detail">' + escHtml(e.detail) + '</div>';
      if (e.tags && e.tags.length) {
        html += '<div class="entry-tags">' + e.tags.map(t => '<span class="tag">' + escHtml(t) + '</span>').join('') + '</div>';
      }
      html += '</div>';
    });

    html += '</div>';
  });

  if (!html) {
    html = '<div class="empty-state"><h3>No entries found</h3><p>Try adjusting your search or filters.</p></div>';
  }

  container.innerHTML = html;
  document.getElementById('entryCount').textContent = visibleEntries + ' of ' + totalEntries + ' entries shown';

  // Update stats bar
  updateStats(catCounts, visibleEntries);
}

function updateStats(catCounts, total) {
  const bar = document.getElementById('statsBar');
  let statsHtml = '<div class="stat"><strong>' + total + '</strong> entries shown</div>';
  const catLabels = { outreach: 'Outreach', docs: 'Docs', research: 'Research', system: 'System', planning: 'Planning', meeting: 'Meetings', incident: 'Incidents', milestone: 'Milestones', admin: 'Admin' };
  Object.keys(catCounts).sort().forEach(c => {
    statsHtml += '<div class="stat"><strong>' + catCounts[c] + '</strong> ' + (catLabels[c] || c) + '</div>';
  });
  // Count total sends from outreach entries
  let totalSends = 0;
  logData.forEach(d => d.entries.forEach(e => {
    if (e.tags && e.tags.includes('send')) {
      const match = e.detail.match(/(\d+)\s*(InMail|send|sent)/i);
      if (match) totalSends += parseInt(match[1]);
    }
  }));
  if (totalSends > 0) statsHtml += '<div class="stat"><strong>' + totalSends + '</strong> lifetime sends</div>';
  bar.innerHTML = statsHtml;
}

function addEntry() {
  const date = document.getElementById('newDate').value || new Date().toISOString().slice(0, 10);
  const time = document.getElementById('newTime').value || new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  const cat = document.getElementById('newCat').value;
  const title = document.getElementById('newTitle').value.trim();
  const detail = document.getElementById('newDetail').value.trim();
  const tagsRaw = document.getElementById('newTags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  if (!title) { alert('Please enter a title.'); return; }

  const entry = { time, category: cat, title, detail, tags };

  // Find or create day block
  let dayBlock = logData.find(d => d.date === date);
  if (!dayBlock) {
    dayBlock = { date, day: getDayName(date), entries: [] };
    logData.push(dayBlock);
    logData.sort((a, b) => b.date.localeCompare(a.date));
  }
  dayBlock.entries.push(entry);
  saveLog(logData);

  // Clear form
  document.getElementById('newTitle').value = '';
  document.getElementById('newDetail').value = '';
  document.getElementById('newTags').value = '';

  filterEntries();
}

function exportMarkdown() {
  let md = '# Daily Work Log — Rob Gorham, Testsigma BDR\n\n';
  md += 'Exported: ' + new Date().toISOString().slice(0, 19).replace('T', ' ') + '\n\n---\n\n';
  logData.forEach(day => {
    md += '## ' + formatDate(day.date) + ' (' + (day.day || getDayName(day.date)) + ')\n\n';
    day.entries.forEach(e => {
      md += '### ' + (e.time && e.time !== '—' ? e.time + ' — ' : '') + '[' + e.category.toUpperCase() + '] ' + e.title + '\n';
      md += e.detail + '\n';
      if (e.tags && e.tags.length) md += 'Tags: ' + e.tags.join(', ') + '\n';
      md += '\n';
    });
    md += '---\n\n';
  });
  downloadFile('daily-log-export.md', md, 'text/markdown');
}

function exportCSV() {
  let csv = 'Date,Day,Time,Category,Title,Detail,Tags\n';
  logData.forEach(day => {
    day.entries.forEach(e => {
      csv += '"' + day.date + '","' + (day.day || '') + '","' + (e.time || '') + '","' + e.category + '","' + csvEsc(e.title) + '","' + csvEsc(e.detail) + '","' + (e.tags || []).join('; ') + '"\n';
    });
  });
  downloadFile('daily-log-export.csv', csv, 'text/csv');
}

function exportJSON() {
  downloadFile('daily-log-export.json', JSON.stringify(logData, null, 2), 'application/json');
}

function copyToday() {
  const today = new Date().toISOString().slice(0, 10);
  const dayBlock = logData.find(d => d.date === today);
  if (!dayBlock || !dayBlock.entries.length) {
    alert('No entries for today yet.');
    return;
  }
  let text = formatDate(today) + ' — Daily Log\n\n';
  dayBlock.entries.forEach(e => {
    text += '• [' + e.category.toUpperCase() + '] ' + e.title + '\n';
    text += '  ' + e.detail + '\n\n';
  });
  navigator.clipboard.writeText(text).then(() => alert('Today\'s log copied to clipboard!'));
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getDayName(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function csvEsc(s) { return (s||'').replace(/"/g, '""'); }

// Init
document.getElementById('newDate').value = new Date().toISOString().slice(0, 10);
renderLog();
</script>
