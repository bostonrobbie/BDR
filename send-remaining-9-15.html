<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remaining Sends: 7 Prospects (#9-15)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 16px 20px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
  .header h1 { font-size: 1.2rem; color: #f8fafc; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar { width: 200px; height: 10px; background: #334155; border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); width: 0%; transition: width 0.4s; border-radius: 5px; }
  .progress-text { font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
  .reminder { background: #1e293b; border: 1px solid #f59e0b; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 0.8rem; color: #fbbf24; }
  .reminder strong { color: #f59e0b; }

  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: all 0.3s; }
  .card.sent { opacity: 0.4; border-color: #22c55e; }
  .card.sent .card-head { background: #14532d; }
  .card.active { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }

  .card-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; cursor: pointer; }
  .card-head:hover { background: #253349; }
  .card-left { display: flex; align-items: center; gap: 12px; }
  .num { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; background: #3b82f6; color: white; }
  .name { font-weight: 600; font-size: 1rem; color: #f8fafc; }
  .title-co { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .tag-v { background: #1e3a5f; color: #60a5fa; }
  .tag-p { background: #3b1f5e; color: #c084fc; }
  .tag-m { background: #1a3329; color: #4ade80; }
  .search-link { background: #0ea5e9; color: white; text-decoration: none; font-size: 0.75rem; padding: 6px 14px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
  .search-link:hover { background: #0284c7; }
  .status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
  .status-ready { background: #1e3a5f; color: #60a5fa; }
  .status-sent { background: #14532d; color: #4ade80; }

  .card-body { padding: 0 20px 16px; display: none; }
  .card.active .card-body { display: block; }

  .field-group { margin-bottom: 12px; }
  .field-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
  .field-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.85rem; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; position: relative; }
  .subject-box { background: #172033; border-color: #3b82f6; }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-copy { background: #334155; color: #e2e8f0; }
  .btn-copy:hover { background: #475569; }
  .btn-copy.copied { background: #22c55e; color: white; }
  .btn-sent { background: #16a34a; color: white; font-size: 0.85rem; padding: 10px 24px; }
  .btn-sent:hover { background: #15803d; }
  .btn-sent:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  .meta { font-size: 0.75rem; color: #64748b; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Remaining Sends: 7 Prospects</h1>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-text" id="ptext">0 / 7 sent</div>
  </div>
</div>

<div class="reminder">
  <strong>New Rule:</strong> Before each send, check <strong>linkedin.com/messaging</strong> and search the prospect's name to confirm no prior conversation exists (Sales Nav misses messages from the mabl era).
</div>

<div id="cards"></div>

<script>
const prospects = [
  {
    id: 9, name: "Cherishma Perikala",
    title: "QA Manager @ GoGuardian", loc: "San Francisco, CA",
    vertical: "EdTech", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Cherishma%20Perikala%20GoGuardian)",
    subject: "Multi-platform EdTech QA",
    message: `Hey Cherishma,

With 14+ product updates shipping across ChromeOS, Windows, macOS, iOS, and Android, what takes more QA time, keeping cross-platform regression stable or testing new features like Hall Pass and Pear Deck AI?

EdTech teams shipping across 5 OS platforms usually find that each OS update breaks a chain of existing tests.

Spendflo (similar team size) used Testsigma to cut manual testing by 50% and saw ROI in the first quarter.

If cutting manual testing in half would buy breathing room for new product releases, what day works for a quick look at how they did it?

Rob`,
    words: 99, group: "B", pscore: "3/3", email: "cperikala@goguardian.com"
  },
  {
    id: 10, name: "Jamie Kurt",
    title: "QA Manager @ Vertafore", loc: "Denver, CO",
    vertical: "InsurTech", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Jamie%20Kurt%20Vertafore)",
    subject: "Carrier integration testing",
    message: `Hey Jamie,

With 100+ carrier integrations on the platform and new efficiency features shipping continuously, what takes more QA time, keeping the carrier connectivity tests stable or regression on the agency management suite?

Insurance SaaS platforms usually see test maintenance grow with every carrier API update.

Hansard cut regression from 8 to 5 weeks using Testsigma's AI to auto-fix tests when insurance workflows changed.

If 3 fewer weeks of regression would help the release cadence for agencies, what day works for a quick look at how they did it?

Rob`,
    words: 90, group: "B", pscore: "2/3", email: "jkurt@vertafore.com"
  },
  {
    id: 11, name: "Marcos Guerrero",
    title: "QA Manager @ Plume", loc: "Skokie, IL",
    vertical: "Telecom/IoT", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Marcos%20Guerrero%20Plume)",
    subject: "IoT device matrix testing",
    message: `Hey Marcos,

With 200+ partner devices and apps running across iOS, Android, Windows, and Linux, what takes more QA time, keeping device compatibility tests current or regression on the cloud platform?

IoT platforms usually see the test matrix explode with every new device partner and OS update.

Nagra DTV automated 2,500 tests in 8 months and ran 4x faster using Testsigma across their multi-device streaming platform.

If 4x faster execution would help manage the device partner matrix, what day works for a quick look at how they did it?

Rob`,
    words: 90, group: "B", pscore: "2/3", email: "mguerrero@plume.com"
  },
  {
    id: 12, name: "Terene Lee",
    title: "QA Manager @ Impartner Software", loc: "Riverton, UT",
    vertical: "PRM SaaS", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Terene%20Lee%20Impartner)",
    subject: "Post-migration regression",
    message: `Hey Terene,

After the PX migration and Europe data center launch, what's putting more pressure on QA, stabilizing regression on the new infrastructure or keeping coverage tight across regions?

Post-migration teams usually see test maintenance spike as the new platform surfaces unexpected behavior.

Sanofi cut regression from 3 days to 80 minutes using Testsigma while maintaining compliance across regions.

If 80-minute regression would help stabilize the post-migration release cadence, what day works for a quick look at how they did it?

Rob`,
    words: 86, group: "B", pscore: "3/3", email: "terene.lee@impartner.com"
  },
  {
    id: 13, name: "Federico Romano",
    title: "QA Manager @ Legion Technologies", loc: "Redwood City, CA",
    vertical: "Workforce SaaS", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Federico%20Romano%20Legion%20Technologies)",
    subject: "AI feature testing velocity",
    message: `Hey Federico,

With 5 new features shipping this year plus real-time HRIS and POS integrations, what takes more QA time, validating the scheduling outputs across all integrations or keeping integration regression stable?

Teams rolling out multiple AI features usually see testing complexity multiply as each model creates new behavioral paths.

CRED hit 90% regression automation and 5x faster execution using Testsigma while managing complex platform integrations.

What day works to see how they kept release confidence high while shipping that fast?

Rob`,
    words: 81, group: "B", pscore: "3/3", email: "federico@legion.co"
  },
  {
    id: 14, name: "Heleen Vs",
    title: "QA Manager @ 10Pearls", loc: "New York, NY",
    vertical: "IT Services", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Heleen%20Vs%2010Pearls)",
    subject: "Scaling QA delivery",
    message: `Hey Heleen,

Your team tests across fintech, healthcare, and IoT clients simultaneously, right? That means juggling different security rules, compliance deadlines, and release cycles all at once.

The challenge most services firms hit is that each client's tech stack requires a different test approach, which makes centralizing automation nearly impossible.

Cisco manages massive platform testing complexity and cut regression by 35% using AI-powered self-healing, which works across any stack.

If 35% less regression effort across your client teams would help, what day works for a quick look at how they did it?

Rob`,
    words: 83, group: "B", pscore: "2/3", email: "heleen.vs@10pearls.com"
  },
  {
    id: 15, name: "Shantel Gillette",
    title: "QA Manager @ Lucid Software", loc: "Salt Lake City, UT",
    vertical: "SaaS", persona: "Manager", mqs: 10,
    searchUrl: "https://www.linkedin.com/sales/search/people?query=(keywords:Shantel%20Gillette%20Lucid%20Software)",
    subject: "Integration regression at Lucid",
    message: `Hey Shantel,

With 200+ integrations across Lucidchart, Lucidspark, and Lucidscale, what takes more QA time, keeping the integration tests stable or regression on the real-time collaboration features?

Visual collaboration platforms usually see integration maintenance grow faster than the team as partners update their APIs. Each API change requires test rewrites.

CRED hit 90% regression automation and 5x faster execution using Testsigma while managing dozens of third-party integrations.

What day works to see how they kept integration coverage tight while cutting execution by 5x?

Rob`,
    words: 88, group: "A", pscore: "3/3", email: "sgillette@lucidsoftware.com"
  }
];

let sentCount = 0;
const total = prospects.length;

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  prospects.forEach((p, i) => {
    const isSent = p.sent;
    const isActive = !isSent && (i === 0 || prospects[i-1].sent);
    const card = document.createElement('div');
    card.className = 'card' + (isSent ? ' sent' : '') + (isActive ? ' active' : '');
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <div class="card-head" onclick="toggle(${p.id})">
        <div class="card-left">
          <div class="num">${p.id}</div>
          <div>
            <div class="name">${p.name}</div>
            <div class="title-co">${p.title} &bull; ${p.loc}</div>
            <div class="tags">
              <span class="tag tag-v">${p.vertical}</span>
              <span class="tag tag-p">${p.persona}</span>
              <span class="tag tag-m">MQS ${p.mqs}</span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <a class="search-link" href="${p.searchUrl}" target="_blank" onclick="event.stopPropagation()">Open in Sales Nav</a>
          <span class="status-badge ${isSent ? 'status-sent' : 'status-ready'}">${isSent ? 'SENT' : 'READY'}</span>
        </div>
      </div>
      <div class="card-body" style="${isActive ? 'display:block' : ''}">
        <div class="field-group">
          <div class="field-label">Subject Line</div>
          <div class="field-box subject-box" id="subj-${p.id}">${p.subject}</div>
          <div class="btn-row">
            <button class="btn btn-copy" onclick="copyEl('subj-${p.id}', this)">Copy Subject</button>
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">Message Body</div>
          <div class="field-box" id="msg-${p.id}">${p.message}</div>
          <div class="btn-row">
            <button class="btn btn-copy" onclick="copyEl('msg-${p.id}', this)">Copy Message</button>
          </div>
        </div>
        <div class="meta">${p.words} words &bull; Group ${p.group} &bull; Personalization: ${p.pscore} &bull; Email: ${p.email}</div>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn btn-sent" onclick="markSent(${p.id})" ${isSent ? 'disabled' : ''}>
            ${isSent ? 'Sent' : 'Mark as Sent'}
          </button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function toggle(id) {
  const card = document.getElementById('card-' + id);
  if (card.classList.contains('sent')) return;
  const body = card.querySelector('.card-body');
  body.style.display = body.style.display === 'block' ? 'none' : 'block';
}

function copyEl(elId, btn) {
  const text = document.getElementById(elId).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = btn.textContent.includes('Subject') ? 'Copy Subject' : 'Copy Message'; }, 1500);
  });
}

function markSent(id) {
  const p = prospects.find(x => x.id === id);
  if (p && !p.sent) {
    p.sent = true;
    sentCount++;
    render();
    // auto-scroll to next unsent
    const next = prospects.find(x => !x.sent);
    if (next) {
      setTimeout(() => {
        document.getElementById('card-' + next.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    }
  }
}

function updateProgress() {
  const sent = prospects.filter(p => p.sent).length;
  const pct = Math.round((sent / total) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptext').textContent = sent + ' / ' + total + ' sent';
  if (sent === total) {
    document.getElementById('ptext').textContent = 'All 7 sent!';
    document.getElementById('pbar').style.background = 'linear-gradient(90deg, #22c55e, #16a34a)';
  }
}

render();
</script>
</body>
</html>
