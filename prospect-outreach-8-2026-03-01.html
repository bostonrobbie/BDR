        let currentFilter = { tier: 'all', email: 'all', search: '' };

        function renderProspects() {
            const grid = document.getElementById('prospectsGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';

            const filtered = prospects.filter(p => {
                if (currentFilter.tier !== 'all' && p.tier !== currentFilter.tier) return false;
                if (currentFilter.email === 'email' && !p.email) return false;
                if (currentFilter.email === 'inmail' && p.email) return false;
                if (currentFilter.search) {
                    const search = currentFilter.search.toLowerCase();
                    if (!p.name.toLowerCase().includes(search) && !p.company.toLowerCase().includes(search)) {
                        return false;
                    }
                }
                return true;
            });

            if (filtered.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            filtered.forEach(p => {
                const tierBadge = p.tier === 'a' ? 'badge-tier-a' : p.tier === 'b' ? 'badge-tier-b' : 'badge-tier-c';
                const emailBadge = p.email ? '<span class="badge badge-email">Has Email</span>' : '';

                const card = document.createElement('div');
                card.className = 'prospect-card';
                card.innerHTML = `
                    <div class="prospect-header" onclick="toggleCard(this.parentElement)">
                        <div class="prospect-info">
                            <div class="prospect-name">${p.name}</div>
                            <div class="prospect-meta">${p.title} @ ${p.company}</div>
                        </div>
                        <div class="prospect-badges">
                            <span class="badge ${tierBadge}">Tier ${p.tier.toUpperCase()}</span>
                            ${emailBadge}
                            <span class="expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="prospect-content">
                        <div class="field-group">
                            <div class="field-label">LinkedIn</div>
                            <div class="field-value">${p.linkedin ? `<a href="${p.linkedin}" target="_blank">View Profile</a>` : 'Not found'}</div>
                        </div>
                        ${p.email ? `<div class="field-group">
                            <div class="field-label">Email</div>
                            <div class="field-value">${p.email}</div>
                        </div>` : ''}
                        <div class="field-group">
                            <div class="field-label">Apollo ID</div>
                            <div class="field-value">${p.apollo}</div>
                        </div>
                        <div class="field-group">
                            <div class="field-label">Company Info</div>
                            <div class="field-value">${p.industry}${p.employees ? ' • ' + p.employees + ' employees' : ''} • ${p.city}</div>
                        </div>
                        ${p.note ? `<div class="field-group">
                            <div class="field-label">Notes</div>
                            <div class="field-value">${p.note}</div>
                        </div>` : ''}
                        <div class="field-group">
                            <div class="field-label">Status</div>
                            <select class="status-select" onchange="updateStatus(${p.id}, this.value)">
                                <option value="not-started">Not Started</option>
                                <option value="touch1-sent">Touch 1 Sent</option>
                                <option value="touch2-sent">Touch 2 Sent</option>
                                <option value="touch3-sent">Touch 3 Sent</option>
                                <option value="replied">Replied</option>
                                <option value="meeting-booked">Meeting Booked</option>
                                <option value="not-interested">Not Interested</option>
                                <option value="bounced">Bounced</option>
                                <option value="dormant">Dormant</option>
                            </select>
                        </div>
                        <div class="message-section">
                            <div class="field-label">Subject Line</div>
                            <div class="field-value">${p.subject}</div>
                            <button class="copy-button" onclick="copyText('${p.subject}', this)">Copy Subject</button>
                        </div>
                        <div class="message-section">
                            <div class="field-label">Message Body</div>
                            <div class="message-text">${p.message.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                            <button class="copy-button" onclick="copyText(\`${p.message.replace(/`/g, '\\`')}\`, this)">Copy Message</button>
                        </div>
                        <div class="field-group">
                            <div class="field-label">Proof Point</div>
                            <div class="field-value">${p.proof}</div>
                        </div>
                        <div class="field-group">
                            <div class="field-label">Close Pattern</div>
                            <div class="field-value">${p.closePattern}</div>
                        </div>
                        <div class="field-group">
                            <div class="field-label">QA Gate</div>
                            <div class="qa-gate ${p.qaGate === 'PASS' ? 'pass' : 'fail'}">${p.qaGate}</div>
                            <div class="mqs-badge">MQS: ${p.mqs}/12</div>
                            <div class="qa-notes">Word Count: ${p.wordCount} | Questions: ${p.questions} | Hyphens: ≤1 | Paragraph Breaks: 4+</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleCard(card) {
            card.classList.toggle('expanded');
        }

        function filterTier(tier) {
            currentFilter.tier = tier;
            document.querySelectorAll('.filter-group .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProspects();
        }

        function filterEmail(type) {
            currentFilter.email = type;
            document.querySelectorAll('.filter-group .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProspects();
        }

        function filterSearch() {
            currentFilter.search = document.getElementById('searchBox').value;
            renderProspects();
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = btn.textContent.includes('Subject') ? 'Copy Subject' : 'Copy Message';
                }, 2000);
            });
        }

        function updateStatus(id, status) {
            localStorage.setItem(`prospect-${id}-status`, status);
        }

        function exportCSV() {
            let csv = 'Name,Company,Email,Title,Tier,Status,Subject\n';
            const filtered = prospects.filter(p => {
                if (currentFilter.tier !== 'all' && p.tier !== currentFilter.tier) return false;
                if (currentFilter.email === 'email' && !p.email) return false;
                if (currentFilter.email === 'inmail' && p.email) return false;
                return true;
            });
            filtered.forEach(p => {
                const status = localStorage.getItem(`prospect-${p.id}-status`) || 'not-started';
                csv += `"${p.name}","${p.company}","${p.email || ''}","${p.title}","${p.tier}","${status}","${p.subject}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'batch8-prospects.csv';
            a.click();
        }

        renderProspects();
    </script>
